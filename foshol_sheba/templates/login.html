{% extends 'base.html' %}
{% load static %}

{% block title %}লগ ইন - ফসলসেবা{% endblock %}

{% block content %}
<section class="auth-container">
    <div class="auth-card glass">
        <div class="text-center mb-4">
            <h2 class="mb-2">স্বাগতম</h2>
            <p class="text-muted small">আপনার তথ্য প্রদান করুন</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="username" class="form-label fw-600 small">ইউজারনেম বা ইমেইল</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="আপনার ইউজারনেম দিন"
                    required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label fw-600 small">পাসওয়ার্ড</label>
                <div class="position-relative">
                    <input type="password" class="form-control" id="password" name="password" placeholder="••••••••"
                        required>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="remember" name="remember">
                    <label class="form-check-label small" for="remember">মনে রাখুন</label>
                </div>
                <a href="#" class="text-success small text-decoration-none fw-600">পাসওয়ার্ড ভুলে গেছেন?</a>
            </div>

            <button type="submit" class="btn auth-btn shadow-sm">লগ ইন করুন</button>

            <div class="text-center mt-4">
                <p class="small text-muted">অ্যাকাউন্ট নেই? <a href="{% url 'core:register' %}"
                        class="text-success fw-600 text-decoration-none">অ্যাকাউন্ট তৈরি করুন</a></p>
            </div>
        </form>
    </div>
</section>
{% endblock %}
